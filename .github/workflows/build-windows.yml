name: build-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      upload-artifacts:
        description: "Upload msi + nsis installers as workflow artifacts"
        default: true
        type: boolean

permissions:
  contents: write   # needed for uploading to a release when triggered by a tag

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── Python backend sidecar ────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python sidecar (PyInstaller)
        run: pyinstaller --clean --noconfirm backend-sidecar.spec

      - name: Stage sidecar for Tauri
        # Tauri's externalBin expects the file named with the target triple.
        # On windows-latest the triple is x86_64-pc-windows-msvc.
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ui\src-tauri\binaries | Out-Null
          Copy-Item `
            -Path dist\backend-sidecar.exe `
            -Destination ui\src-tauri\binaries\backend-sidecar-x86_64-pc-windows-msvc.exe `
            -Force

      # ── Tauri frontend + bundle ───────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            ui\src-tauri\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ui/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: npm install
        working-directory: ui
        run: npm ci

      - name: Build Tauri bundle (msi + nsis)
        working-directory: ui
        run: npm run tauri:build
        env:
          # Signing — set these in repo secrets to produce a signed installer.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Publish ───────────────────────────────────────────────────
      - name: List bundle outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse ui\src-tauri\target\release\bundle | `
            Where-Object { $_.Extension -in ".msi", ".exe" } | `
            Select-Object FullName, Length | Format-Table

      - name: Upload installers
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: hyperliquid-bot-windows
          if-no-files-found: error
          path: |
            ui/src-tauri/target/release/bundle/msi/*.msi
            ui/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach to GitHub release (tag builds)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/src-tauri/target/release/bundle/msi/*.msi
            ui/src-tauri/target/release/bundle/nsis/*.exe
